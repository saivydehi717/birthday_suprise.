<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Your Surprise? 🐱</title>

    <link rel="stylesheet" href="cat.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Main Card -->
    <div class="container">

        <div class="cat">
            🐱
        </div>

        <h1>Hello Cutie ❤️</h1>

        <p class="question">
            Do you want to open your Birthday Surprise? 🎁
        </p>

        <div class="buttons">

            <button id="yesBtn" onclick="openSurprise()">
                Yes 💖
            </button>

            <button id="noBtn">
                No 🙈
            </button>

        </div>

        <p class="small">
            Choose carefully 😺
        </p>

    </div>

    <script src="cat.js"></script>

</body>

</html>
