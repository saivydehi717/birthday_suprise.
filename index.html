<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise ❤️</title>

    <link rel="stylesheet" href="lock.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>

<div class="container">

    <div class="lock">🔒</div>

    <h1>Secret Birthday Surprise</h1>

    <p>Enter the secret passcode to unlock your surprise ❤️</p>

    <input
        type="password"
        id="password"
        placeholder="Enter Passcode">

    <button onclick="checkPassword()">
        Unlock Surprise 🎁
    </button>

    <p id="error"></p>

</div>

<script src="lock.js"></script>

</body>
</html>
