<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Memories ❤️</title>

    <link rel="stylesheet" href="gallery.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="stars"></div>
    <div class="moon"></div>
    <div class="hearts"></div>

    <div class="container">

        <h1>📸 Our Beautiful Memories ❤️</h1>

        <p class="subtitle">
            Every picture tells a beautiful story...
        </p>

        <div class="gallery">

            <div class="photo">
                <img src="photo1.jpg" alt="Photo 1">
                <span>✨ Beautiful Smile</span>
            </div>

            <div class="photo">
                <img src="photo2.jpg" alt="Photo 2">
                <span>🌸 Lovely Moment</span>
            </div>

            <div class="photo">
                <img src="photo3.jpg" alt="Photo 3">
                <span>💖 Cute Memory</span>
            </div>

            <div class="photo">
                <img src="photo4.jpg" alt="Photo 4">
                <span>🎈 Happy Times</span>
            </div>

            <div class="photo">
                <img src="photo5.jpg" alt="Photo 5">
                <span>😊 Forever Special</span>
            </div>

            <div class="photo">
                <img src="photo6.jpg" alt="Photo 6">
                <span>🌹 Birthday Queen</span>
            </div>

        </div>

        <button onclick="nextPage()">
            Continue ❤️
        </button>

    </div>

    <div id="lightbox">
        <span id="close">&times;</span>
        <img id="bigImage" alt="Large preview">
    </div>

    <script src="gallery.js"></script>

</body>

</html>
